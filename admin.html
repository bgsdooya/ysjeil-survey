<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>만족도 조사 대시보드 | 양산제일병원</title>
<style>
  :root{
    --bg:#f2f4f6; --card:#fff; --line:#e2e6ea; --line2:#ccd2d8;
    --txt:#1a1f24; --txt2:#5c646d; --txt3:#8d949b;
    --navy:#1b5a8e; --navy-bg:#e9f1f8;
    --teal:#1a8fa8; --green:#3f9c4f; --orange:#e8842a; --red:#c0392b;
    --r:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    font-size:15px; line-height:1.6;
  }
  .hide{display:none !important;}

  /* ---------- 로그인 ---------- */
  #login{max-width:380px; margin:14vh auto; padding:0 20px;}
  #login .box{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:30px 26px;}
  #login h1{font-size:19px; margin:0 0 4px; text-align:center;}
  #login .sub{font-size:13px; color:var(--txt2); text-align:center; margin:0 0 24px;}
  #login label{display:block; font-size:13px; font-weight:600; margin:14px 0 6px;}
  #login input{
    width:100%; padding:12px; font-size:15px; border:1.5px solid var(--line2);
    border-radius:8px; font-family:inherit;
  }
  #login input:focus{outline:none; border-color:var(--navy);}
  #login button{
    width:100%; margin-top:22px; padding:13px; border:none; border-radius:8px;
    background:var(--navy); color:#fff; font-size:15px; font-weight:600;
    font-family:inherit; cursor:pointer;
  }
  #login button:disabled{background:var(--line2);}
  .alert{background:#fdeceb; color:var(--red); font-size:13px; padding:10px 12px;
    border-radius:8px; margin-top:14px; text-align:center;}

  /* ---------- 헤더 ---------- */
  header{
    background:var(--card); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20;
  }
  .hd{max-width:1180px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:14px;}
  .hd h1{font-size:16px; font-weight:700; margin:0; flex:1;}
  .hd h1 small{display:block; font-size:12px; color:var(--txt3); font-weight:400;}
  .hd select, .hd button{
    padding:8px 12px; font-size:13px; border:1.5px solid var(--line2);
    border-radius:7px; background:#fff; font-family:inherit; cursor:pointer; color:var(--txt);
  }
  .hd button.out{border-color:var(--line); color:var(--txt2);}

  nav{max-width:1180px; margin:0 auto; padding:0 12px; display:flex; gap:2px; overflow-x:auto;}
  nav button{
    padding:11px 15px; border:none; background:none; font-size:14px; font-family:inherit;
    color:var(--txt2); cursor:pointer; white-space:nowrap; border-bottom:2.5px solid transparent;
  }
  nav button.on{color:var(--navy); font-weight:700; border-bottom-color:var(--navy);}

  main{max-width:1180px; margin:0 auto; padding:22px 20px 60px;}
  .pane{display:none;} .pane.on{display:block;}

  h2.sec{font-size:15px; margin:0 0 3px;}
  p.note{font-size:12.5px; color:var(--txt3); margin:0 0 14px;}

  /* ---------- 카드 ---------- */
  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(168px,1fr)); gap:12px; margin-bottom:26px;}
  .kpi{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px 18px;}
  .kpi .k{font-size:12px; color:var(--txt2); margin:0 0 6px;}
  .kpi .v{font-size:28px; font-weight:700; line-height:1.1; margin:0; letter-spacing:-.02em;}
  .kpi .v span{font-size:14px; font-weight:500; color:var(--txt3); margin-left:2px;}
  .kpi .d{font-size:11.5px; color:var(--txt3); margin:5px 0 0;}
  .kpi.clickable{cursor:pointer; position:relative; transition:.1s;}
  .kpi.clickable:hover{border-color:var(--navy); box-shadow:0 2px 10px rgba(27,90,142,.1);}
  .kpi.clickable::after{
    content:'ⓘ'; position:absolute; top:12px; right:14px;
    font-size:13px; color:var(--line2);
  }
  .kpi.clickable:hover::after{color:var(--navy);}

  .modal-bg{
    position:fixed; inset:0; background:rgba(20,26,32,.5); z-index:100;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .modal{
    background:var(--card); border-radius:14px; max-width:560px; width:100%;
    max-height:85vh; overflow-y:auto; padding:26px 28px; box-shadow:0 12px 40px rgba(0,0,0,.25);
  }
  .modal-head{display:flex; align-items:flex-start; gap:12px; margin-bottom:6px;}
  .modal-head h3{font-size:19px; margin:0; flex:1;}
  .modal-x{
    border:none; background:var(--bg); width:32px; height:32px; border-radius:8px;
    cursor:pointer; font-size:18px; color:var(--txt2); flex-shrink:0; line-height:1;
  }
  .modal .lead{font-size:14px; color:var(--txt2); margin:0 0 18px; line-height:1.7;}
  .modal h4{font-size:13px; color:var(--navy); margin:18px 0 8px;}
  .modal p{font-size:13.5px; line-height:1.75; margin:0 0 10px;}
  .modal table{margin:8px 0 4px;}
  .modal .example{
    background:var(--bg); border-radius:8px; padding:12px 14px; font-size:13px;
    line-height:1.7; margin:8px 0; color:var(--txt2);
  }
  .modal .tip{
    background:var(--navy-bg); border-radius:8px; padding:11px 14px;
    font-size:13px; line-height:1.7; margin:12px 0 0; color:#134a75;
  }
  .modal .now{font-weight:700; color:var(--navy);}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:18px; margin-bottom:16px;}
  .panel h3{font-size:14px; margin:0 0 3px;}
  .panel .sub{font-size:12px; color:var(--txt3); margin:0 0 16px;}

  /* ---------- 표 ---------- */
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th, td{padding:10px 8px; text-align:center; border-bottom:1px solid var(--line);}
  th{font-size:12px; font-weight:600; color:var(--txt2); background:#fafbfc;}
  th:first-child, td:first-child{text-align:left; padding-left:12px;}
  tbody tr:last-child td{border-bottom:none;}
  td.mask{color:var(--txt3); cursor:help;}
  .cell{display:inline-block; min-width:52px; padding:5px 0; border-radius:5px; font-weight:600;}

  .qname{text-align:left; font-size:13px;}
  .qtag{
    display:inline-block; font-size:10.5px; font-weight:700; padding:2px 6px;
    border-radius:4px; background:var(--navy-bg); color:var(--navy); margin-right:7px;
  }
  .bar{height:7px; background:var(--line); border-radius:4px; overflow:hidden; min-width:80px;}
  .bar i{display:block; height:100%; background:var(--navy);}

  .delta.up{color:var(--green); font-weight:600;}
  .delta.dn{color:var(--red); font-weight:600;}
  .delta.eq{color:var(--txt3);}

  .chips{display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;}
  .chip{
    padding:7px 14px; border:1.5px solid var(--line2); border-radius:20px;
    font-size:13px; cursor:pointer; background:#fff; color:var(--txt2); font-family:inherit;
  }
  .chip.on{background:var(--navy); border-color:var(--navy); color:#fff; font-weight:600;}

  .cmp{display:flex; gap:8px; align-items:center; margin-bottom:16px; flex-wrap:wrap;}
  .cmp input{padding:8px 10px; font-size:13px; border:1.5px solid var(--line2); border-radius:7px;
    width:110px; font-family:ui-monospace,Menlo,monospace;}
  .cmp button{padding:8px 16px; border:none; border-radius:7px; background:var(--navy);
    color:#fff; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;}
  .cmp span{font-size:13px; color:var(--txt3);}

  .txtitem{border-bottom:1px solid var(--line); padding:14px 2px;}
  .txtitem:last-child{border-bottom:none;}
  .txtitem .meta{font-size:11.5px; color:var(--txt3); margin-bottom:5px;}
  .txtitem .meta b{color:var(--txt2); font-weight:600;}
  .txtitem p{margin:0; font-size:14px; line-height:1.7; white-space:pre-wrap;}
  .txtitem{display:flex; gap:10px; align-items:flex-start;}
  .txtitem .body{flex:1;}
  .flagbtn{
    flex-shrink:0; width:30px; height:30px; border:1.5px solid var(--line2);
    border-radius:7px; background:#fff; cursor:pointer; font-size:15px; line-height:1;
    color:var(--txt3); display:flex; align-items:center; justify-content:center;
    margin-top:2px; transition:.1s;
  }
  .flagbtn.on{ background:#fff6e0; border-color:#f0b429; color:#f0932b; }
  .txtitem.flagged{ background:#fffdf5; margin:0 -8px; padding:14px 8px; border-radius:8px; }
  .txttools{display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap;}
  .txttools button{
    padding:7px 14px; border:1.5px solid var(--line2); border-radius:20px;
    font-size:13px; cursor:pointer; background:#fff; color:var(--txt2); font-family:inherit;
  }
  .txttools button.on{ background:var(--navy); border-color:var(--navy); color:#fff; font-weight:600; }
  .txttools .cnt{ font-size:12.5px; color:var(--txt3); margin-left:auto; }
  .grouphead{font-size:12px; font-weight:700; color:#b9770c; margin:4px 0 10px; letter-spacing:.02em;}
  .score{display:inline-block; padding:1px 7px; border-radius:4px; font-weight:700; font-size:11px;}

  .empty{text-align:center; padding:56px 20px; color:var(--txt3); font-size:14px;}
  canvas{max-height:320px;}
  .warnbox{background:#fff8ec; border:1px solid #f0d9ac; color:#7d5310;
    font-size:12.5px; padding:11px 14px; border-radius:8px; margin-bottom:16px;}
</style>
</head>
<body>

<!-- ================= 로그인 ================= -->
<div id="login">
  <div class="box">
    <h1>만족도 조사 대시보드</h1>
    <p class="sub">양산제일병원 · 관리자 전용</p>
    <label>이메일</label>
    <input type="email" id="email" autocomplete="username">
    <label>비밀번호</label>
    <input type="password" id="pw" autocomplete="current-password">
    <button id="loginBtn">로그인</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- ================= 대시보드 ================= -->
<div id="dash" class="hide">
  <header>
    <div class="hd">
      <h1>퇴원 환자 만족도 조사<small>양산제일병원</small></h1>
      <select id="period"></select>
      <button class="out" id="logout">로그아웃</button>
    </div>
    <nav id="nav"></nav>
  </header>

  <main>
    <div class="pane on" data-p="summary"></div>
    <div class="pane" data-p="ward"></div>
    <div class="pane" data-p="question"></div>
    <div class="pane" data-p="cross"></div>
    <div class="pane" data-p="room"></div>
    <div class="pane" data-p="compare"></div>
    <div class="pane" data-p="text"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
/* ============================================================
   설정 — index.html 과 동일한 값
   ============================================================ */
const SUPABASE_URL  = 'https://zxommpndvpcakzxllebs.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4b21tcG5kdnBjYWt6eGxsZWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NzU5NzMsImV4cCI6MjA5OTE1MTk3M30.YGMhMk899JyJ0vmWENkHHrRtibywmw599gZlf4L-qVM';

// ⚠️ 새 회차를 시작하면 반드시 여기에 추가할 것.
//    누락 시 해당 회차 데이터가 대시보드에 표시되지 않음.
const PERIODS = ['2026-1기', '2027-1기', '2027-2기'];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ============================================================
   문항 메타
   ============================================================ */
const QMETA = {
  q1:['진료','주치의 상태 설명'],      q2:['진료','치료계획·검사결과 설명'],
  q3:['간호','간호사 친절'],           q4:['간호','간호사 질문 응대'],
  q5:['원무','원무 직원 친절'],        q6:['원무','입·퇴원 수속 신속·편리'],
  q7:['치료','치료 내용 만족'],        q8:['치료','치료사 친절'],
  q9:['치료','치료 시간 충분'],        q10:['영양','병원 식사'],
  q11:['환경','공동생활환경 청결'],    q12:['퇴원','퇴원 안내 충분'],
  q13:['전반','전반적 서비스 만족']
};

const TABS = [
  ['summary','요약'], ['ward','병동'], ['question','문항'],
  ['cross','교차 분석'], ['room','치료실'], ['compare','회차 비교'], ['text','자유 의견']
];

let period = PERIODS[0];
let charts = {};

/* ============================================================
   유틸
   ============================================================ */
const $  = s => document.querySelector(s);
const pane = p => document.querySelector(`.pane[data-p="${p}"]`);

// 1~5 점수 → 배경색
function scoreColor(v){
  if (v == null) return '#f4f5f7';
  if (v >= 4.5) return '#dff3e3';
  if (v >= 4.0) return '#eaf6ec';
  if (v >= 3.5) return '#fff6e5';
  if (v >= 3.0) return '#ffeedb';
  return '#fdeceb';
}
function scoreText(v){
  if (v == null) return 'var(--txt3)';
  if (v >= 4.0) return '#1e6b34';
  if (v >= 3.5) return '#8a5a12';
  if (v >= 3.0) return '#a35410';
  return '#a02b1e';
}
const fmt = v => (v == null || v === undefined) ? '–' : v;

function killCharts(){
  Object.values(charts).forEach(c => c && c.destroy());
  charts = {};
}
function emptyMsg(msg){
  return `<div class="empty">${msg}</div>`;
}

/* ============================================================
   로그인
   ============================================================ */
$('#loginBtn').addEventListener('click', doLogin);
$('#pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin(){
  const btn = $('#loginBtn');
  $('#loginErr').innerHTML = '';
  btn.disabled = true; btn.textContent = '확인 중…';

  const { error } = await sb.auth.signInWithPassword({
    email: $('#email').value.trim(),
    password: $('#pw').value
  });

  if (error){
    $('#loginErr').innerHTML = `<div class="alert">로그인에 실패했습니다</div>`;
    btn.disabled = false; btn.textContent = '로그인';
    return;
  }
  await enter();
}

$('#logout').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

async function enter(){
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) return;

  const role = session.user?.app_metadata?.role;
  if (role !== 'admin'){
    $('#loginErr').innerHTML =
      `<div class="alert">관리자 권한이 없습니다.<br>
       권한을 방금 부여했다면 로그아웃 후 다시 로그인하세요.</div>`;
    $('#loginBtn').disabled = false;
    $('#loginBtn').textContent = '로그인';
    await sb.auth.signOut();
    return;
  }

  $('#login').classList.add('hide');
  $('#dash').classList.remove('hide');

  // 회차 셀렉트
  const sel = $('#period');
  sel.innerHTML = PERIODS.map(p => `<option value="${p}">${p}</option>`).join('');
  sel.addEventListener('change', () => { period = sel.value; render(); });

  // 탭
  const nav = $('#nav');
  nav.innerHTML = TABS.map(([k,l],i) =>
    `<button data-t="${k}" class="${i===0?'on':''}">${l}</button>`).join('');
  nav.addEventListener('click', e => {
    const b = e.target.closest('button'); if(!b) return;
    nav.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
    pane(b.dataset.t).classList.add('on');
  });

  render();
}

/* ============================================================
   렌더 전체
   ============================================================ */
async function render(){
  killCharts();
  await Promise.all([
    renderSummary(), renderWard(), renderQuestion(),
    renderCross(), renderRoom(), renderText()
  ]);
  renderCompareShell();
}

/* ---------- 1. 요약 ---------- */
async function renderSummary(){
  const p = pane('summary');
  const { data, error } = await sb.rpc('admin_summary', { p_period: period });

  if (error || !data || !data.n){
    p.innerHTML = `<h2 class="sec">요약</h2><p class="note">${period}</p>` +
      emptyMsg(error ? '데이터를 불러오지 못했습니다' : '아직 응답이 없습니다');
    return;
  }

  const nps = data.nps;
  const npsColor = nps >= 50 ? 'var(--green)' : nps >= 0 ? 'var(--orange)' : 'var(--red)';

  p.innerHTML = `
    <h2 class="sec">요약</h2>
    <p class="note">${period} · 전체 응답 기준 · <b>카드를 누르면 해석 방법이 나옵니다</b></p>
    <div class="cards">
      <div class="kpi clickable" data-info="n"><p class="k">총 응답</p><p class="v">${data.n}<span>건</span></p>
        <p class="d">기간 내 누적</p></div>
      <div class="kpi clickable" data-info="avg"><p class="k">전체 평균</p><p class="v">${fmt(data.avg_score)}<span>/ 5</span></p>
        <p class="d">13문항 단순 평균</p></div>
      <div class="kpi clickable" data-info="top2"><p class="k">Top-2 Box</p><p class="v">${fmt(data.top2_box)}<span>%</span></p>
        <p class="d">평균 4점 이상 응답 비율</p></div>
      <div class="kpi clickable" data-info="nps"><p class="k">NPS</p>
        <p class="v" style="color:${npsColor}">${fmt(nps)}</p>
        <p class="d">추천(9–10) − 비추천(0–6)</p></div>
      <div class="kpi clickable" data-info="fall"><p class="k">낙상교육 이행률</p><p class="v">${fmt(data.fall_edu_rate)}<span>%</span></p>
        <p class="d">"예" 응답 비율</p></div>
      <div class="kpi clickable" data-info="assist"><p class="k">보조 응답 비율</p><p class="v">${fmt(data.assisted_rate)}<span>%</span></p>
        <p class="d">직원 대면 보조</p></div>
    </div>

    ${data.n < 30 ? `<div class="warnbox">
      응답이 ${data.n}건입니다. 30건 미만에서는 병동·연령별 세부 지표가
      표본 오차에 크게 흔들립니다. 추세 판단에만 참고하세요.
    </div>` : ''}

    <div class="panel">
      <h3>Top-2 Box를 우선 보세요</h3>
      <p class="sub">평균 3.8 → 3.9는 노이즈와 구분되지 않습니다.
        4·5점 응답 비율의 이동이 실제 개선 신호입니다.</p>
    </div>`;

  // 카드 클릭 → 해석 모달
  p.querySelectorAll('.kpi.clickable').forEach(card => {
    card.addEventListener('click', () => openInfo(card.dataset.info));
  });
}

/* ---------- 요약 카드 해석 모달 ---------- */
const INFO = {
  n: {
    title:'총 응답',
    lead:'이번 회차에 접수된 설문 건수입니다.',
    body:`
      <h4>얼마나 있어야 하나요</h4>
      <p><b>30건 미만</b>이면 병동·연령별 세부 비교는 표본 오차가 커서 신뢰하기 어렵습니다.
      전체 경향 파악용으로만 쓰세요.</p>
      <p><b>50건 이상</b>이면 병동 단위 비교가 안정적으로 가능합니다.</p>

function openInfo(key){
  const info = INFO[key];
  if (!info) return;
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <h3>${info.title}</h3>
        <button class="modal-x">✕</button>
      </div>
      <p class="lead">${info.lead}</p>
      ${info.body}
    </div>`;
  document.body.appendChild(bg);
  const close = () => bg.remove();
  bg.addEventListener('click', e => { if (e.target === bg) close(); });
  bg.querySelector('.modal-x').addEventListener('click', close);
  document.addEventListener('keydown', function esc(e){
    if (e.key === 'Escape'){ close(); document.removeEventListener('keydown', esc); }
  });
}

    <p class="note">두 회차의 문항별 평균 차이 (Δ = 현재 − 이전)</p>

      <input id="cPrev" value="${prev}"> <span>→</span>
      <input id="cCurr" value="${period}">
      <button id="cRun">비교</button>
    </div>
    <div class="warnbox">
      기존 종이 설문은 3점 척도였으므로 비교 대상이 아닙니다.
      <b>2026-1기가 기준선(baseline)</b>입니다.
    </div>
    <div id="cmpBody"></div>`;

  $('#cRun').addEventListener('click', loadCompare);

async function loadCompare(){
  const box = $('#cmpBody');
  const a = $('#cPrev').value.trim(), b = $('#cCurr').value.trim();
  box.innerHTML = `<div class="empty">불러오는 중…</div>`;

  const { data, error } = await sb.rpc('admin_period_compare', { p_prev:a, p_curr:b });
  if (error || !data || !data.length){
    box.innerHTML = emptyMsg('비교할 데이터가 없습니다');
    return;
  }
  const valid = data.filter(r => r.prev_avg != null || r.curr_avg != null);
  if (!valid.length){ box.innerHTML = emptyMsg('비교할 데이터가 없습니다'); return; }

  const rows = valid.map(r => {
    const d = r.delta;
    const cls = d == null ? 'eq' : d > 0.05 ? 'up' : d < -0.05 ? 'dn' : 'eq';
    const sign = d == null ? '–' : (d > 0 ? '▲ +' + d.toFixed(2) : d < 0 ? '▼ ' + d.toFixed(2) : '– 0.00');
    const [cat,label] = QMETA[r.q] || ['','?'];
    return `<tr>
      <td class="qname"><span class="qtag">${cat}</span>${label}</td>
      <td>${fmt(r.prev_avg)}</td>
      <td>${fmt(r.curr_avg)}</td>
      <td class="delta ${cls}">${sign}</td>
    </tr>`;
  }).join('');

  if (charts.cmp) charts.cmp.destroy();

  box.innerHTML = `
    <div class="panel">
      <h3>문항별 변화</h3>
      <p class="sub">${a} → ${b}</p>
      <canvas id="chCmp"></canvas>
    </div>
    <div class="panel">
      <table>
        <thead><tr><th>문항</th><th>${a}</th><th>${b}</th><th>Δ</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  charts.cmp = new Chart($('#chCmp'), {
    type:'bar',
    data:{
      labels: valid.map(r => QMETA[r.q]?.[1] || r.q),
      datasets:[
        { label:a, data:valid.map(r=>r.prev_avg), backgroundColor:'#cfd6dd', borderRadius:3 },
        { label:b, data:valid.map(r=>r.curr_avg), backgroundColor:'#1b5a8e', borderRadius:3 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom', labels:{boxWidth:12, font:{size:11}}} },
      scales:{ y:{ min:1, max:5 }, x:{ ticks:{font:{size:10}} } }
    }
  });
  $('#chCmp').style.height = '340px';
}

/* ---------- 7. 자유 의견 ---------- */
let textData = [];
let textOnlyFlagged = false;

// 체크 표시는 이 브라우저에만 저장됨 (localStorage)
function flagKey(){ return 'ysjeil_flag_' + period; }
function loadFlags(){
  try { return new Set(JSON.parse(localStorage.getItem(flagKey()) || '[]')); }
  catch(e){ return new Set(); }
}
function saveFlags(set){
  try { localStorage.setItem(flagKey(), JSON.stringify([...set])); } catch(e){}
}
// created_at 을 안정적 식별자로 사용
function rowKey(r){ return r.created_at; }

async function renderText(){
  const p = pane('text');
  const { data, error } = await sb.rpc('admin_free_text', { p_period: period, p_limit: 200 });

  if (error || !data || !data.length){
    p.innerHTML = `<h2 class="sec">자유 의견</h2>` +
      emptyMsg(error ? '불러오지 못했습니다' : '작성된 의견이 없습니다');
    return;
  }
  textData = data;
  paintText();
}

function itemHTML(r, flagged){
  const d = new Date(r.created_at);
  const ds = `${d.getMonth()+1}/${d.getDate()}`;
  const sc = r.avg_score;
  const k = rowKey(r);
  return `<div class="txtitem ${flagged?'flagged':''}" data-k="${k}">
    <button class="flagbtn ${flagged?'on':''}" data-k="${k}" title="회의 보고용으로 체크">${flagged?'★':'☆'}</button>
    <div class="body">
      <p class="meta">
        <b>${r.ward}병동</b> · ${r.dept} · ${r.age_group} · ${ds}
        <span class="score" style="background:${scoreColor(sc)};color:${scoreText(sc)}">평균 ${sc}</span>
      </p>
      <p>${(r.free_text||'').replace(/</g,'&lt;')}</p>
    </div>
  </div>`;
}

function paintText(){
  const p = pane('text');
  const flags = loadFlags();
  const flaggedRows = textData.filter(r => flags.has(rowKey(r)));
  const otherRows   = textData.filter(r => !flags.has(rowKey(r)));

  let body = '';
  if (textOnlyFlagged){
    body = flaggedRows.length
      ? flaggedRows.map(r => itemHTML(r, true)).join('')
      : `<div class="empty">체크한 의견이 없습니다</div>`;
  } else {
    if (flaggedRows.length){
      body += `<p class="grouphead">★ 회의 보고용 (${flaggedRows.length})</p>`;
      body += flaggedRows.map(r => itemHTML(r, true)).join('');
      body += `<div style="height:8px"></div>`;
    }
    body += otherRows.map(r => itemHTML(r, false)).join('');
  }

  p.innerHTML = `
    <h2 class="sec">자유 의견</h2>
    <p class="note">${period} · 총 ${textData.length}건 · 체크한 항목은 상단에 모입니다</p>
    <div class="txttools">
      <button id="flagAll" class="${textOnlyFlagged?'on':''}">★ 체크만 보기</button>
      <button id="flagClear">체크 전체 해제</button>
      <span class="cnt">★ ${flaggedRows.length} / ${textData.length}</span>
    </div>
    <div class="warnbox">
      체크 표시는 <b>이 브라우저(이 PC)에만 저장</b>됩니다. 발표 전 미리 체크해 두세요.<br>
      개인정보나 특정 직원 실명이 포함된 응답은 사전에 정한 기준에 따라 처리하십시오.
    </div>
    <div class="panel">${body}</div>`;

  // 체크 토글
  p.querySelectorAll('.flagbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const set = loadFlags();
      const k = btn.dataset.k;
      if (set.has(k)) set.delete(k); else set.add(k);
      saveFlags(set);
      paintText();
    });
  });
  // 체크만 보기
  p.querySelector('#flagAll').addEventListener('click', () => {
    textOnlyFlagged = !textOnlyFlagged; paintText();
  });
  // 전체 해제
  p.querySelector('#flagClear').addEventListener('click', () => {
    if (confirm('이 회차의 체크를 모두 해제할까요?')){
      saveFlags(new Set()); textOnlyFlagged = false; paintText();
    }
  });
}

  const { data:{ session } } = await sb.auth.getSession();
  if (session) await enter();
})();
